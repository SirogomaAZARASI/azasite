<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>迷路ゲーム | AZAgame</title>
<meta name="description" content="AZAgameの迷路ゲーム。スマホ・PC対応の無料ブラウザゲーム。">

<style>
html, body {
  margin: 0;
  min-height: 100vh;
}

body {
  font-family: sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #1e1e2f, #2a2a40);
  color: #fff;
  padding-bottom: calc(140px + env(safe-area-inset-bottom));
}

/* 迷路 */
table {
  margin: 10px auto;
  border-collapse: collapse;
}

td {
  width: 8px;
  height: 8px;
  border: 1px solid #666;
}

.wall { background: #bbb; }
.player { background: #00c6ff; }
.goal { background: gold; }

/* ジョイスティック */
#joystick {
  width: 120px;
  height: 120px;
  margin: 20px auto;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  position: relative;
  touch-action: none;
}

#stick {
  width: 50px;
  height: 50px;
  background: #00c6ff;
  border-radius: 50%;
  position: absolute;
  top: 35px;
  left: 35px;
}

button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #2d2d44;
  color: white;
}

/* クリア */
#clearScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.7);
  flex-direction: column;
}
</style>
</head>

<body>

<h1>迷路ゲーム</h1>
<div id="timer">0.0 秒</div>

<div id="sizeUI">
  <button onclick="startGame(31)">小</button>
  <button onclick="startGame(61)">中</button>
  <button onclick="startGame(101)">大</button>
</div>

<table id="maze"></table>

<div id="joystick"></div>

<button id="restartButton">リスタート</button>

<div id="clearScreen">
  <div id="clearText"></div>
  <button onclick="closeClear()">OK</button>
</div>

<script>
let size=61, maze=[], playerX=1, playerY=1;
let startTime=0, timerInterval;

/* ===== スクロール制御 ===== */
/* 1本指は防止、2本指は許可 */
document.addEventListener('touchmove', function(e){
  if (e.touches.length === 1) {
    e.preventDefault();
  }
}, { passive:false });

/* ダブルタップ防止 */
let lastTouchEnd=0;
document.addEventListener('touchend', function(e){
  const now=Date.now();
  if(now-lastTouchEnd<=300) e.preventDefault();
  lastTouchEnd=now;
}, false);

/* ===== ゲーム ===== */
function startGame(s){
  size=s;
  document.getElementById("sizeUI").style.display="none";
  playerX=1; playerY=1;
  generateMaze();
  drawMaze();
  startTimer();
}

function startTimer(){
  clearInterval(timerInterval);
  startTime=Date.now();
  timerInterval=setInterval(()=>{
    const t=((Date.now()-startTime)/1000).toFixed(1);
    timer.textContent=t+" 秒";
  },100);
}

function generateMaze(){
  maze=Array(size).fill().map(()=>Array(size).fill(1));
  function carve(x,y){
    maze[y][x]=0;
    [[0,-2],[0,2],[-2,0],[2,0]].sort(()=>Math.random()-0.5)
    .forEach(([dx,dy])=>{
      let nx=x+dx, ny=y+dy;
      if(nx>0&&ny>0&&nx<size&&ny<size&&maze[ny][nx]===1){
        maze[y+dy/2][x+dx/2]=0;
        carve(nx,ny);
      }
    });
  }
  carve(1,1);
  maze[size-2][size-2]=2;
}

function drawMaze(){
  const table=mazeEl;
  table.innerHTML="";
  for(let y=0;y<size;y++){
    const row=document.createElement("tr");
    for(let x=0;x<size;x++){
      const cell=document.createElement("td");
      if(x===playerX&&y===playerY) cell.className="player";
      else if(maze[y][x]===1) cell.className="wall";
      else if(maze[y][x]===2) cell.className="goal";
      row.appendChild(cell);
    }
    table.appendChild(row);
  }
}

function move(dx,dy){
  const nx=playerX+dx, ny=playerY+dy;
  if(nx>=0&&ny>=0&&nx<size&&ny<size&&maze[ny][nx]!==1){
    playerX=nx; playerY=ny;
    drawMaze();
    if(maze[ny][nx]===2){
      clearInterval(timerInterval);
      showClear();
    }
  }
}

/* ===== クリア ===== */
function showClear(){
  clearText.textContent="クリア！ "+timer.textContent;
  clearScreen.style.display="flex";
}
function closeClear(){
  clearScreen.style.display="none";
}

/* ===== ジョイスティック ===== */
const joystick=document.getElementById("joystick");
const stick=document.createElement("div");
stick.id="stick";
joystick.appendChild(stick);

let joy=false;

joystick.addEventListener("touchstart",()=>joy=true);
joystick.addEventListener("touchend",()=>{
  joy=false;
  stick.style.left="35px";
  stick.style.top="35px";
});

joystick.addEventListener("touchmove",(e)=>{
  if(!joy) return;
  const rect=joystick.getBoundingClientRect();
  const x=e.touches[0].clientX-rect.left-60;
  const y=e.touches[0].clientY-rect.top-60;

  const dx=Math.max(-40,Math.min(40,x));
  const dy=Math.max(-40,Math.min(40,y));

  stick.style.left=(dx+35)+"px";
  stick.style.top=(dy+35)+"px";

  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>15) move(1,0);
    if(dx<-15) move(-1,0);
  }else{
    if(dy>15) move(0,1);
    if(dy<-15) move(0,-1);
  }
});

/* ===== キーボード ===== */
let keyInterval;
document.addEventListener("keydown",e=>{
  if(keyInterval) return;

  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)){
    e.preventDefault(); // ←スクロール防止
  }

  keyInterval=setInterval(()=>{
    if(e.key==="ArrowUp") move(0,-1);
    if(e.key==="ArrowDown") move(0,1);
    if(e.key==="ArrowLeft") move(-1,0);
    if(e.key==="ArrowRight") move(1,0);
  },80);
});

document.addEventListener("keyup",()=>{
  clearInterval(keyInterval);
  keyInterval=null;
});

/* ===== リスタート確認 ===== */
restartButton.onclick=()=>{
  if(confirm("リスタートしますか？")) {
    sizeUI.style.display="block";
    mazeEl.innerHTML="";
    clearInterval(timerInterval);
    timer.textContent="0.0 秒";
  }
};

/* ===== 要素取得 ===== */
const mazeEl=document.getElementById("maze");
const timer=document.getElementById("timer");
const clearText=document.getElementById("clearText");
const clearScreen=document.getElementById("clearScreen");
const sizeUI=document.getElementById("sizeUI");
const restartButton=document.getElementById("restartButton");
</script>

</body>
</html>
