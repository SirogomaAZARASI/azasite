<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>モグラ叩き</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  text-align: center;
  margin: 0;
  background: #f0f0f0;
}

h1 { margin-top: 10px; }

#score, #timer {
  font-size: 1.2em;
  margin: 5px;
}

.controls {
  margin: 10px;
}

select, button {
  font-size: 1em;
  margin: 5px;
  padding: 6px 12px;
}

.grid {
  display: grid;
  gap: 8px;
  width: 90vmin;
  margin: 10px auto;
}

.hole {
  background: #ccc;
  border-radius: 10px;
  aspect-ratio: 1 / 1;
  position: relative;
  overflow: hidden;
}

.mole-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  position: absolute;
  top: 0;
  left: 0;
}

/* 赤丸 */
.bad {
  width: 60%;
  height: 60%;
  background: red;
  border-radius: 50%;
  position: absolute;
  top: 20%;
  left: 20%;
}

/* 落下アニメ */
@keyframes fallDown {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(120%); opacity: 0; }
}

.out-anim {
  animation: fallDown 0.4s ease forwards;
}

/* モーダル */
#ruleModal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

#ruleBox {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 80%;
  max-width: 400px;
  position: relative;
}

#closeBtn {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>モグラ叩き</h1>

<div class="controls">
  <select id="level">
    <option value="1">レベル1</option>
    <option value="2">レベル2</option>
  </select>

  <select id="size">
    <option value="3">3×3</option>
    <option value="4">4×4</option>
    <option value="5">5×5</option>
  </select>

  <button onclick="startGame()">スタート</button>
</div>

<div id="score">スコア: 0</div>
<div id="timer">残り時間: 30秒</div>

<div class="grid" id="grid"></div>

<!-- ルール -->
<div id="ruleModal">
  <div id="ruleBox">
    <div id="closeBtn" onclick="closeRule()">×</div>
    <h2>ルール説明</h2>
    <p id="ruleText"></p>
  </div>
</div>

<script>
let holes = [];
let score = 0;
let current = null;
let currentType = "";
let timeLeft = 30;

let moleInterval = null;
let timerInterval = null;

const grid = document.getElementById('grid');
const levelSelect = document.getElementById('level');
const sizeSelect = document.getElementById('size');

const scoreDisplay = document.getElementById('score');
const timerDisplay = document.getElementById('timer');
const ruleModal = document.getElementById('ruleModal');
const ruleText = document.getElementById('ruleText');

/* ===== グリッド ===== */
function createGrid() {
  grid.innerHTML = "";
  const size = parseInt(sizeSelect.value);
  grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

  holes = [];

  for (let i = 0; i < size * size; i++) {
    const div = document.createElement('div');
    div.classList.add('hole');

    div.addEventListener('touchstart', () => handleHit(i), { passive: true });
    div.addEventListener('click', () => handleHit(i));

    grid.appendChild(div);
    holes.push(div);
  }
}

/* ===== ルール ===== */
function showRule() {
  const level = levelSelect.value;

  if (level == 1) {
    ruleText.textContent = "あざらしを叩いてスコアアップ！赤丸は叩くと減点。";
  }

  if (level == 2) {
    ruleText.textContent = "サングラスのあざらしだけ叩こう！普通のあざらしは減点。";
  }

  ruleModal.style.display = "flex";
}

function closeRule() {
  ruleModal.style.display = "none";
  startMainGame();
}

/* ===== 画像 ===== */
function getSealImage() {
  const num = Math.floor(Math.random() * 5) + 1;
  return "images/" + num + ".png";
}

function getSunImage() {
  const num = Math.floor(Math.random() * 2) + 1;
  return "images/sun" + num + ".png";
}

/* ===== 出現 ===== */
function showMole() {
  if (current !== null) holes[current].innerHTML = '';

  const index = Math.floor(Math.random() * holes.length);
  const level = levelSelect.value;

  let type = "";

  if (level == 1) {
    type = Math.random() < 0.7 ? "seal" : "bad";
  }

  if (level == 2) {
    type = Math.random() < 0.5 ? "glasses" : "seal";
  }

  let element;

  if (type === "bad") {
    element = document.createElement('div');
    element.classList.add('bad');
  } else {
    element = document.createElement('img');
    element.classList.add('mole-img');

    if (type === "seal") element.src = getSealImage();
    if (type === "glasses") element.src = getSunImage();
  }

  holes[index].appendChild(element);
  current = index;
  currentType = type;
}

/* ===== 叩く ===== */
function handleHit(index) {
  if (index !== current) return;

  const level = levelSelect.value;
  const hole = holes[current];

  // スコア
  if (level == 1) {
    if (currentType === "seal") score++;
    else score -= 2;
  }

  if (level == 2) {
    if (currentType === "glasses") score++;
    else score -= 1;
  }

  scoreDisplay.textContent = 'スコア: ' + score;

  // アニメ
  const img = hole.querySelector('img');

  if (img) {
    img.src = "images/out.png";
    img.classList.add('out-anim');

    setTimeout(() => {
      hole.innerHTML = '';
    }, 400);
  } else {
    hole.innerHTML = '';
  }

  current = null;
}

/* ===== 開始 ===== */
function startGame() {
  clearInterval(moleInterval);
  clearInterval(timerInterval);

  score = 0;
  timeLeft = 30;

  scoreDisplay.textContent = 'スコア: 0';
  timerDisplay.textContent = '残り時間: 30秒';

  createGrid();
  showRule();
}

function startMainGame() {
  moleInterval = setInterval(showMole, 800);

  timerInterval = setInterval(() => {
    timeLeft--;
    timerDisplay.textContent = '残り時間: ' + timeLeft + '秒';

    if (timeLeft <= 0) {
      clearInterval(moleInterval);
      clearInterval(timerInterval);
      alert('ゲーム終了！スコア: ' + score);
    }
  }, 1000);
}
</script>

</body>
</html>
