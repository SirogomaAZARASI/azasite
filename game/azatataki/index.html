<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>あざらし叩き | AZAgame</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="あざらし叩きゲームブラウザでプレイできます。"><script async src="https://www.googletagmanager.com/gtag/js?id=G-DK3VQGQTWC"></script>
<script>
window.dataLayer=window.dataLayer||[];
function gtag(){dataLayer.push(arguments);}
gtag('js',new Date());
gtag('config','G-DK3VQGQTWC');
</script>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,sans-serif;
  background:#0f1115;
  color:#e6e6eb;
  text-align:center;
}

.grid {
  display: grid;
  gap: 8px;
  width: 90vmin;
  margin: 10px auto;
}

.hole {
  background: #ccc;
  border-radius: 10px;
  aspect-ratio: 1 / 1;
  position: relative;
  overflow: hidden;
}

.mole-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  position: absolute;
  top: 0;
  left: 0;
}

.bad {
  width: 60%;
  height: 60%;
  background: red;
  border-radius: 50%;
  position: absolute;
  top: 20%;
  left: 20%;
}

@keyframes fallDown {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(120%); opacity: 0; }
}

.out-anim {
  animation: fallDown 1.6s ease forwards;
}

.hit-anim {
  animation: pop 0.15s ease;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<h1>あざらし叩き</h1>

<select id="level">
  <option value="1">レベル1</option>
  <option value="2">レベル2</option>
</select>

<select id="size">
  <option value="3">3×3</option>
  <option value="4">4×4</option>
  <option value="5">5×5</option>
  <option value="6">6×6</option>
</select>

<button onclick="startGame()">スタート</button>

<div id="score">スコア: 0</div>
<div id="timer">残り時間: 30秒</div>

<div class="grid" id="grid"></div>

<script>
let holes = [];
let score = 0;
let current = null;
let currentType = "";
let timeLeft = 30;

let moleInterval = null;
let timerInterval = null;

/* 追加：バグ防止フラグ */
let isAnimating = false;

const grid = document.getElementById('grid');
const levelSelect = document.getElementById('level');
const sizeSelect = document.getElementById('size');

const scoreDisplay = document.getElementById('score');
const timerDisplay = document.getElementById('timer');

function createGrid() {
  grid.innerHTML = "";
  const size = parseInt(sizeSelect.value);
  grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

  holes = [];

  for (let i = 0; i < size * size; i++) {
    const div = document.createElement('div');
    div.classList.add('hole');

    /* スマホ反応も改善 */
    div.addEventListener('pointerdown', () => handleHit(i));

    grid.appendChild(div);
    holes.push(div);
  }
}

function getSealImage() {
  return "images/" + (Math.floor(Math.random()*5)+1) + ".png";
}

function getSunImage() {
  return "images/sun" + (Math.floor(Math.random()*2)+1) + ".png";
}

function showMole() {
  if (isAnimating) return; // ← 超重要（競合防止）

  if (current !== null) holes[current].innerHTML = '';

  const index = Math.floor(Math.random() * holes.length);
  const level = levelSelect.value;

  let type = "";

  if (level == 1) {
    type = Math.random() < 0.7 ? "seal" : "bad";
  } else {
    type = Math.random() < 0.5 ? "glasses" : "seal";
  }

  let element;

  if (type === "bad") {
    element = document.createElement('div');
    element.classList.add('bad');
  } else {
    element = document.createElement('img');
    element.classList.add('mole-img');
    element.src = (type === "seal") ? getSealImage() : getSunImage();
  }

  holes[index].appendChild(element);
  current = index;
  currentType = type;
}

function handleHit(index) {
  if (index !== current) return;
  if (isAnimating) return;

  isAnimating = true;

  const hole = holes[current];
  const img = hole.querySelector('img');

  let correct = false;
  const level = levelSelect.value;

  if (level == 1) {
    correct = (currentType === "seal");
    score += correct ? 1 : -2;
  } else {
    correct = (currentType === "glasses");
    score += correct ? 1 : -1;
  }

  scoreDisplay.textContent = 'スコア: ' + score;

  if (img) {
    img.classList.add('hit-anim');
    img.src = "images/out.png";

    setTimeout(() => {
      img.classList.add('out-anim');
    }, 150);

    setTimeout(() => {
      hole.innerHTML = '';
      current = null;
      isAnimating = false; // ← ここで解除
    }, 1800);
  } else {
    hole.innerHTML = '';
    current = null;
    isAnimating = false;
  }
}

function startGame() {
  clearInterval(moleInterval);
  clearInterval(timerInterval);

  score = 0;
  timeLeft = 30;
  isAnimating = false;

  scoreDisplay.textContent = 'スコア: 0';
  timerDisplay.textContent = '残り時間: 30秒';

  createGrid();

  moleInterval = setInterval(showMole, 800);

  timerInterval = setInterval(() => {
    timeLeft--;
    timerDisplay.textContent = '残り時間: ' + timeLeft + '秒';

    if (timeLeft <= 0) {
      clearInterval(moleInterval);
      clearInterval(timerInterval);
      alert('ゲーム終了！スコア: ' + score);
    }
  }, 1000);
}
</script>

</body>
</html>
