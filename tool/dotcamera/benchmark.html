<h2>DotCamera ベンチマーク(限界値計測)</h2>

<h3>本ツールの測定結果はあくまで目安であり、動作や性能を保証するものではありません。<br>

<canvas id="cv" width="300" height="300"></canvas><br>
<button onclick="start()">開始</button>

<script>
const cv=document.getElementById("cv");
const ctx=cv.getContext("2d");

let dot=32;
let color=32;

let trials=0;
let success=0;

let stage="dot";
let best={dot:0,color:0};

let failStreak=0;

function draw(){
  let cell=300/dot;

  for(let y=0;y<dot;y++){
    for(let x=0;x<dot;x++){
      let c=(x*7+y*5)%color;
      ctx.fillStyle=`hsl(${(c/color)*360},100%,50%)`;
      ctx.fillRect(x*cell,y*cell,cell,cell);
    }
  }
}

function loop(){
  draw();

  let start=performance.now();
  for(let i=0;i<1200000;i++){}
  let t=performance.now()-start;

  trials++;
  if(t<16.5) success++;

  document.getElementById("info").innerText=
`stage: ${stage}
dot: ${dot}
color: ${color}
success: ${success}/${trials}
failStreak: ${failStreak}`;

  if(trials>=12){
    let rate=success/trials;

    if(rate>0.75){
      failStreak=0;

      best={dot,color};

      if(stage==="dot"){
        dot=Math.min(512,Math.floor(dot*1.5));
      }else{
        color=Math.min(256,Math.floor(color*1.4));
      }

    }else{
      failStreak++;

      if(failStreak>=3){
        // ★高性能PCで止まる問題対策
        if(stage==="dot"){
          dot=Math.max(16,Math.floor(dot*0.85));
        }else{
          color=Math.max(4,Math.floor(color*0.85));
        }
        failStreak=0;
      }else{
        if(stage==="dot"){
          dot=Math.max(8,Math.floor(dot*0.6));
          stage="color";
        }else{
          color=Math.max(2,Math.floor(color*0.6));
        }
      }
    }

    trials=0;
    success=0;

    // 強制遷移（安全装置）
    if(stage==="dot" && dot>=512){
      stage="color";
      dot=best.dot;
    }

    if(stage==="color" && color>=256){
      finish();
      return;
    }
  }

  requestAnimationFrame(loop);
}

function finish(){
  document.getElementById("info").innerText=
`=== 最大値 ===
dot: ${best.dot}
color: ${best.color}`;
}

function start(){
  dot=32;
  color=32;
  trials=0;
  success=0;
  failStreak=0;
  stage="dot";
  loop();
}
</script>
